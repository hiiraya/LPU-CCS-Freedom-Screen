<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Freedom Wall</title>
  <style>
    :root {
      --bg: #000000;
      --panel: rgba(4, 11, 8, 0.88);
      --panel-soft: #070f07;
      --panel-strong: #0a1f0a;
      --border: #1a3d2a;
      --border-soft: #0d3a0d;
      --text: #00ff88;
      --text-strong: #00ff41;
      --text-dim: #6ea287;
      --text-muted: #5c8f73;
      --glow: rgba(0, 255, 136, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        repeating-linear-gradient(180deg, rgba(0, 255, 136, 0.03) 0 1px, transparent 1px 3px),
        #050505;
      color: var(--text);
      font-family: Consolas, Monaco, "Courier New", monospace;
    }

    .shell {
      width: min(720px, 100%);
      display: grid;
      gap: 22px;
      justify-items: center;
    }

    .title-bar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(2, 10, 6, 0.78);
      box-shadow: 0 0 18px rgba(0, 255, 65, 0.08);
      text-align: center;
    }

    .title-primary {
      color: var(--text-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .title-divider {
      color: #235b38;
      font-size: 11px;
      line-height: 1;
    }

    .title-secondary {
      color: #2a8a2a;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .card {
      width: min(100%, 560px);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      overflow: hidden;
      background: var(--panel-soft);
      box-shadow:
        0 0 0 1px rgba(0, 255, 136, 0.06),
        0 18px 44px rgba(0, 0, 0, 0.38),
        0 0 34px var(--glow);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--panel-strong);
      border-bottom: 1px solid var(--border-soft);
      color: #2a8c2a;
      font-size: 15px;
    }

    .card-header .spacer {
      flex: 1;
    }

    .card-header .meta {
      color: #1a5c1a;
      font-size: 13px;
    }

    .card-body {
      display: grid;
      gap: 20px;
      justify-items: center;
      padding: 28px 26px 30px;
      text-align: center;
      background: linear-gradient(180deg, rgba(0, 255, 136, 0.02), rgba(0, 0, 0, 0));
    }

    .qr-shell {
      width: clamp(220px, 32vw, 290px);
      padding: 14px;
      border: 1px solid rgba(0, 255, 136, 0.14);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(214, 245, 224, 0.08), rgba(255, 255, 255, 0.03));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 22px rgba(0, 255, 136, 0.08);
    }

    .qr-frame {
      aspect-ratio: 1 / 1;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 14px;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(241, 252, 245, 0.98), rgba(227, 244, 233, 0.98));
      overflow: hidden;
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      mix-blend-mode: multiply;
      filter: contrast(1.08) saturate(0.92);
    }

    .headline {
      color: var(--text-strong);
      font-size: clamp(1.3rem, 2.3vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 0.5;
    }

    .copy {
      max-width: 60ch;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.7;
    }

    .hint {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card-body {
        padding: 22px 18px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="title-bar">
      <span class="title-primary">CCS FREEDOM</span>
      <span class="title-divider">/</span>
      <span class="title-secondary">DIGITAL WALL</span>
    </div>

    <section class="card" aria-label="Freedom wall QR panel">
      <header class="card-header">
        <span>&gt; entry.py</span>
        <span class="spacer"></span>
        <span class="meta">[SCAN TO POST]</span>
      </header>

      <div class="card-body">
        <div class="qr-shell">
          <div class="qr-frame">
            <img src="qr.jpg" alt="QR code for the CCS Freedom Wall" />
          </div>
        </div>

        <h1 class="headline">Scan The QR Code</h1>
        <p class="copy">
          Scan the code, and send your message to the Wall 
          using programming languages of your choice.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
